name: Weekly previous-week dog headlines

on:
  schedule:
    # 7:25am Monday Australia/Brisbane time. Brisbane is UTC+10 year-round.
    # The generator collects dog-related headlines dated in the previous completed Monday-Sunday week.
    - cron: "25 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh dog headlines
        run: python tools/refresh-dog-headlines.py

      - name: Commit refreshed board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/dog-headlines.json assets/data/dog-headline-archive-index.json dog-news.html dog-news-archive.html archive tools/refresh-dog-headlines.py data/dog-headline-sources.json
          if git diff --cached --quiet; then
            echo "No headline changes to commit."
          else
            git commit -m "Refresh previous-week dog headlines"
            git push
          fi
